<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/bejoice-logo-blue.png" />
    <link rel="apple-touch-icon" href="/bejoice-logo-blue.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bejoice — Saudi's Leading Smart Freight, AI Powered</title>
    <meta name="description" content="Bejoice — Saudi Arabia's award-winning, AI-powered freight forwarder. Seamless end-to-end logistics with reliability, efficiency, and the strength of a powerful global network. Connecting KSA to the World." />
    <meta name="keywords" content="freight forwarding Saudi Arabia, smart freight AI, logistics KSA, heavy lift Saudi, customs clearance Riyadh, Bejoice" />
    <meta property="og:title" content="Bejoice — Saudi's Leading Smart Freight, AI Powered" />
    <meta property="og:description" content="Award-winning freight forwarder delivering seamless end-to-end logistics solutions with reliability, efficiency, and the strength of a powerful global network." />
    <meta property="og:image" content="/bejoice-logo-white.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bejoice — Saudi's Leading Smart Freight, AI Powered" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload critical first frame for zero-delay hero load -->
    <link rel="preload" as="image" href="/frames1/0001.jpg" />
    <!-- Fonts — single consolidated request -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <!-- Cal.com: preconnect for speed -->
  <link rel="preconnect" href="https://cal.com" />
  <link rel="preconnect" href="https://app.cal.com" />
  <link rel="dns-prefetch" href="https://cal.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <!-- Force scroll to top before any rendering — prevents browser scroll restoration -->
  <script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; window.scrollTo(0, 0);</script>

  <script>
    // Dual-locale Cal.com preloader — both EN and AR iframes load in background
    document.addEventListener('DOMContentLoaded', function() {
      var CAL_BASE = 'https://cal.com/sudeshna-pal-ruww5f/freight-consultation?embed=true&theme=dark&layout=month_view&brandColor=%235BC2E7&hideEventTypeDetails=false';
      var IFRAME_STYLE = 'position:absolute;inset:0;width:100%;height:100%;border:none;display:block;';

      // Overlay backdrop
      var overlay = document.createElement('div');
      overlay.id = 'cal-overlay';
      overlay.style.cssText = [
        'position:fixed','inset:0','z-index:99999',
        'background:rgba(3,3,6,0.88)',
        'backdrop-filter:blur(18px)','-webkit-backdrop-filter:blur(18px)',
        'display:none','align-items:center','justify-content:center',
        'padding:1rem',
      ].join(';');

      // Modal box
      var box = document.createElement('div');
      box.style.cssText = [
        'position:relative','width:100%','max-width:900px',
        'height:min(90vh,720px)',
        'background:#0c1c30',
        'border:1px solid rgba(91,194,231,0.25)',
        'border-radius:16px','overflow:visible',
        'box-shadow:0 32px 80px rgba(0,0,0,0.9)',
      ].join(';');

      // Gold top bar
      var bar = document.createElement('div');
      bar.style.cssText = 'position:absolute;top:0;left:0;right:0;height:3px;z-index:1;background:linear-gradient(90deg,transparent,rgba(91,194,231,0.9),transparent);pointer-events:none;';

      // Close button
      var closeBtn = document.createElement('button');
      closeBtn.innerHTML = '&#x2715;';
      closeBtn.style.cssText = [
        'position:absolute','top:12px','right:12px','z-index:2147483647',
        'background:rgba(7,16,28,0.97)',
        'border:2px solid rgba(91,194,231,0.85)',
        'border-radius:50%','width:44px','height:44px',
        'color:#fff','font-size:22px','line-height:1','cursor:pointer',
        'display:flex','align-items:center','justify-content:center',
        'box-shadow:0 2px 16px rgba(0,0,0,0.9),0 0 14px rgba(91,194,231,0.35)',
        'transition:all 0.2s ease',
        'pointer-events:all','isolation:isolate',
      ].join(';');
      closeBtn.onmouseenter = function() {
        closeBtn.style.background = 'rgba(91,194,231,0.25)';
        closeBtn.style.borderColor = '#5BC2E7';
        closeBtn.style.boxShadow = '0 2px 20px rgba(91,194,231,0.5)';
      };
      closeBtn.onmouseleave = function() {
        closeBtn.style.background = 'rgba(7,16,28,0.95)';
        closeBtn.style.borderColor = 'rgba(91,194,231,0.8)';
        closeBtn.style.boxShadow = '0 2px 16px rgba(0,0,0,0.9),0 0 12px rgba(91,194,231,0.3)';
      };
      closeBtn.onclick = function() { overlay.style.display = 'none'; };

      // Inner clip with relative positioning so both iframes stack
      var inner = document.createElement('div');
      inner.style.cssText = 'position:relative;width:100%;height:100%;border-radius:16px;overflow:hidden;';

      // English iframe (visible by default)
      var iframeEn = document.createElement('iframe');
      iframeEn.src = CAL_BASE + '&locale=en';
      iframeEn.style.cssText = IFRAME_STYLE + 'opacity:1;transition:opacity 0.2s;';
      iframeEn.setAttribute('loading', 'eager');
      iframeEn.setAttribute('allow', 'camera;microphone;payment');

      // Arabic iframe (hidden, preloading in background)
      var iframeAr = document.createElement('iframe');
      iframeAr.src = CAL_BASE + '&locale=ar';
      iframeAr.style.cssText = IFRAME_STYLE + 'opacity:0;transition:opacity 0.2s;pointer-events:none;';
      iframeAr.setAttribute('loading', 'eager');
      iframeAr.setAttribute('allow', 'camera;microphone;payment');

      inner.appendChild(bar);
      inner.appendChild(iframeEn);
      inner.appendChild(iframeAr);
      box.appendChild(inner);
      box.appendChild(closeBtn);
      overlay.appendChild(box);
      document.body.appendChild(overlay);

      overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') overlay.style.display = 'none';
      });

      // Show correct iframe instantly — no reload needed
      window.__showCalModal = function() {
        var isAr = document.documentElement.lang === 'ar';
        if (isAr) {
          iframeAr.style.opacity = '1'; iframeAr.style.pointerEvents = 'auto';
          iframeEn.style.opacity = '0'; iframeEn.style.pointerEvents = 'none';
        } else {
          iframeEn.style.opacity = '1'; iframeEn.style.pointerEvents = 'auto';
          iframeAr.style.opacity = '0'; iframeAr.style.pointerEvents = 'none';
        }
        overlay.style.display = 'flex';
      };
    });
  </script>
  </head>
  <body style="background: #07101c;">
    <div id="root" style="opacity: 0; transition: opacity 0.5s ease-out; background: #030306;"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Signal to fade in the app once critical hero assets are ready
      window.__markHeroReady = function() {
        requestAnimationFrame(() => {
          const root = document.getElementById('root');
          if (root) root.style.opacity = '1';
        });
      };
    </script>
  </body>
</html>
